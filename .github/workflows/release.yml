name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Package
        run: |
          cp -r dist masque
          zip -r "masque-${GITHUB_REF_NAME}.zip" masque

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: masque-*.zip
          generate_release_notes: true
          body: |
            Unpacked Chrome extension build.

            Install:
            1. Download `masque-${{ github.ref_name }}.zip` below and unzip it.
            2. Open `chrome://extensions`, enable Developer mode.
            3. Click "Load unpacked" and select the unzipped `masque` folder.
            4. Open the extension's Details page and turn on "Allow user scripts".
